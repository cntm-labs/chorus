name: Publish All SDKs (Manual)

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tests pass
        run: cargo test --workspace

      - name: Publish chorus-core
        run: cargo publish -p chorus-core --no-verify ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index (chorus-core)
        if: inputs.dry-run == 'false'
        run: sleep 30

      - name: Publish chorus-providers
        run: cargo publish -p chorus-providers --no-verify ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index (chorus-providers)
        if: inputs.dry-run == 'false'
        run: sleep 30

      - name: Publish chorus-rs
        run: cargo publish -p chorus-rs --no-verify ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Publish to npm
        if: inputs.dry-run == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run npm publish
        if: inputs.dry-run == 'true'
        run: npm publish --access public --dry-run

  publish-maven:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - run: mvn test

      - name: Deploy to Maven Central
        if: inputs.dry-run == 'false'
        run: mvn deploy -DskipTests -Pcentral
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Dry run Maven deploy
        if: inputs.dry-run == 'true'
        run: mvn package -DskipTests
