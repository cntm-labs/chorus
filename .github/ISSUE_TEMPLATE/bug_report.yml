name: Bug Report
description: Report a bug in Chorus
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Configure provider with...
        2. Send message...
        3. Observe error...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: "e.g., 1.85.0"
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Telnyx
        - Twilio
        - Plivo
        - Resend
        - AWS SES
        - SMTP
        - N/A
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 15"
